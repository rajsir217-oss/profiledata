<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L3V3L Messenger</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <meta name="theme-color" content="#1a1a2e" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; width: 100%; background-color: #1a1a2e; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #root { display: flex; flex-direction: column; }

    /* Slim scrollbars (WebKit) */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(233, 69, 96, 0.4);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(233, 69, 96, 0.7); }
    ::-webkit-scrollbar-corner { background: transparent; }

    /* Firefox */
    * { scrollbar-width: thin; scrollbar-color: rgba(233, 69, 96, 0.4) transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
