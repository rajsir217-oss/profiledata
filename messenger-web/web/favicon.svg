<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded-square background -->
  <rect width="32" height="32" rx="7" fill="#1a1a2e"/>

  <!-- ===== SPEECH BUBBLE (rounded rect + bottom-left tail) ===== -->
  <!-- Bubble fill (dark inside) -->
  <path d="M7 4 h18 a3 3 0 0 1 3 3 v14 a3 3 0 0 1 -3 3 h-11 l-5 6 l2 -6 h-4 a3 3 0 0 1 -3 -3 v-14 a3 3 0 0 1 3 -3 z" fill="#0f1220"/>
  <!-- Bubble outline (red stroke) -->
  <path d="M7 4 h18 a3 3 0 0 1 3 3 v14 a3 3 0 0 1 -3 3 h-11 l-5 6 l2 -6 h-4 a3 3 0 0 1 -3 -3 v-14 a3 3 0 0 1 3 -3 z" fill="none" stroke="#e94560" stroke-width="1.4"/>

  <!-- ===== BLUE BUTTERFLY centered inside ===== -->
  <!-- Upper-left wing -->
  <path d="M15.8 12.5 Q20 7.5 21.5 11 Q20.5 13.5 15.8 12.5Z" fill="#4fc3f7"/>
  <!-- Upper-right wing -->
  <path d="M16.2 12.5 Q12 7.5 10.5 11 Q11.5 13.5 16.2 12.5Z" fill="#4fc3f7"/>
  <!-- Lower-left wing -->
  <path d="M15.8 13 Q19.5 16 18.5 18.5 Q16.5 18.5 15.8 15Z" fill="#29b6f6"/>
  <!-- Lower-right wing -->
  <path d="M16.2 13 Q12.5 16 13.5 18.5 Q15.5 18.5 16.2 15Z" fill="#29b6f6"/>

  <!-- Wing inner highlights -->
  <path d="M15.8 12.5 Q19 8.5 20 11 Q19 12.5 15.8 12.5Z" fill="#81d4fa" opacity="0.5"/>
  <path d="M16.2 12.5 Q13 8.5 12 11 Q13 12.5 16.2 12.5Z" fill="#81d4fa" opacity="0.5"/>

  <!-- Butterfly body -->
  <ellipse cx="16" cy="13.5" rx="0.65" ry="3" fill="#81d4fa"/>

  <!-- Antennae -->
  <path d="M15.5 10.5 Q14 8.5 13 7.5" stroke="#4fc3f7" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  <path d="M16.5 10.5 Q18 8.5 19 7.5" stroke="#4fc3f7" stroke-width="0.6" fill="none" stroke-linecap="round"/>
  <circle cx="13" cy="7.5" r="0.75" fill="#4fc3f7"/>
  <circle cx="19" cy="7.5" r="0.75" fill="#4fc3f7"/>
</svg>
