runtime: nodejs20
env: flex

env_variables:
  REACT_APP_ENVIRONMENT: dev
  REACT_APP_SOCKET_URL: https://matrimonial-backend-458052696267.us-central1.run.app
  REACT_APP_API_URL: https://matrimonial-backend-458052696267.us-central1.run.app/api/users
  REACT_APP_WS_URL: wss://matrimonial-backend-458052696267.us-central1.run.app

# Use custom server for cache control headers
entrypoint: node server.js

# Skip static file serving by App Engine (handled by custom server)
skip_files:
  - ^(.*/)?#.*#$
  - ^(.*/)?.*~$
  - ^(.*/)?.*\.py[co]$
  - ^(.*/)?.*\.d\.ts$
  - ^(.*/)?.*\.d\.map$
  - ^(.*/)?__pycache__/$
  - ^(.*/)?node_modules/$

# Manual scaling for better control
manual_scaling:
  instances: 1
  
# Modern health checks (readiness and liveness)
readiness_check:
  path: /_ah/health
  check_interval_sec: 5
  timeout_sec: 4
  failure_threshold: 2
  success_threshold: 2

liveness_check:
  path: /_ah/health
  check_interval_sec: 30
  timeout_sec: 4
  failure_threshold: 2
  success_threshold: 2
  
# Network settings
network:
  forwarded_ports:
    - 8080
  
# Resources
resources:
  cpu: 1
  memory_gb: 0.5
  disk_size_gb: 10
