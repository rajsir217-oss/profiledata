server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ============================================================
    # PCI-COMPLIANT CACHE-CONTROL HEADERS
    # Sensitive routes: max-age=0, must-revalidate, no-cache, no-store, private
    # Non-sensitive routes: no-cache
    # No Pragma header (deprecated, HTTP/1.0 only)
    # ============================================================

    # config.js - SENSITIVE (contains API URLs/config)
    location = /config.js {
        add_header Cache-Control "max-age=0, must-revalidate, no-cache, no-store, private" always;
        try_files $uri =404;
    }

    # index.html - SENSITIVE (entry point)
    location = /index.html {
        add_header Cache-Control "max-age=0, must-revalidate, no-cache, no-store, private" always;
        try_files $uri =404;
    }

    # manifest.json - non-sensitive
    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
    }

    # Static assets with content hashes - cache for 1 year (immutable)
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Media files - cache for 1 month
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # Sensitive SPA routes (login, register, profile, payments, admin)
    location ~ ^/(login|register|register2|forgot-password|reset-password|profile|settings|dashboard|admin|payments|checkout) {
        try_files $uri /index.html;
        add_header Cache-Control "max-age=0, must-revalidate, no-cache, no-store, private" always;
    }

    # SPA fallback - non-sensitive routes get minimal no-cache
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
