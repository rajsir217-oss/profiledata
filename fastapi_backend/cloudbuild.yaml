steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/matrimonial-backend:latest'
      - '-f'
      - 'Dockerfile.prod'
      - '.'
  
  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/matrimonial-backend:latest']
  
  # Deploy to Cloud Run (cost-optimized)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'matrimonial-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/matrimonial-backend:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--timeout'
      - '300'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '3'
      - '--min-instances'
      - '0'
      - '--concurrency'
      - '80'
      - '--cpu-throttling'

  # Cleanup old images (keep only 3 most recent)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        # List all image digests except the 3 most recent, then delete them
        gcloud container images list-tags gcr.io/$PROJECT_ID/matrimonial-backend \
          --format='get(digest)' --sort-by='~timestamp' \
          | tail -n +4 \
          | xargs -I {} gcloud container images delete gcr.io/$PROJECT_ID/matrimonial-backend@sha256:{} --quiet --force-delete-tags 2>/dev/null || true

images:
  - 'gcr.io/$PROJECT_ID/matrimonial-backend:latest'
